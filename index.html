<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Insane To-Do App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="cursor-glow"></div>
<div class="particles"></div>

<div class="container">
  <h1> My Tasks ⚡</h1>

  <div class="input-box">
    <input type="text" id="taskInput" placeholder="Enter a task...">
    <button id="addBtn">Add</button>
  </div>

  <ul id="taskList"></ul>
</div>

<!-- Sounds -->
<audio id="addSound" src="https://www.soundjay.com/button/sounds/button-16.mp3"></audio>
<audio id="deleteSound" src="https://www.soundjay.com/button/sounds/button-10.mp3"></audio>
<audio id="completeSound" src="https://www.soundjay.com/button/sounds/button-09.mp3"></audio>

<script src="script.js"></script>
</body>
</html>
